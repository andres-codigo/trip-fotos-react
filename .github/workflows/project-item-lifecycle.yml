name: GitHub - Project Item Lifecycle

on:
    pull_request_target:
        types: [opened, reopened, synchronize, closed]

permissions:
    contents: read
    issues: write
    pull-requests: write
    repository-projects: write

jobs:
    sync-project-lifecycle:
        runs-on: ubuntu-latest

        steps:
            - name: Sync issue and project lifecycle
              uses: actions/github-script@v9
              env:
                  PROJECT_ID: PVT_kwHOAybMeM4BCojE
                  PROJECT_STATUS_FIELD_ID: PVTSSF_lAHOAybMeM4BCojEzg0yW4g
                  STATUS_BACKLOG_OPTION_ID: 7be623db
                  STATUS_TODO_OPTION_ID: f75ad846
                  STATUS_IN_PROGRESS_OPTION_ID: 47fc9ee4
                  STATUS_DONE_OPTION_ID: 98236657
                  # Optional PAT for Project v2 writes. Rotation/recreation guide:
                  # .github/project-automation-token.md
                  PROJECT_AUTOMATION_TOKEN: ${{ secrets['PROJECT_AUTOMATION_TOKEN'] }}
              with:
                  github-token: ${{ github.token }}
                  script: |
                      const owner = context.repo.owner
                      const repo = context.repo.repo
                      const pr = context.payload.pull_request

                      const PROJECT_ID = process.env.PROJECT_ID
                      const STATUS_FIELD_ID = process.env.PROJECT_STATUS_FIELD_ID
                      const STATUS = {
                        BACKLOG: process.env.STATUS_BACKLOG_OPTION_ID,
                        TODO: process.env.STATUS_TODO_OPTION_ID,
                        IN_PROGRESS: process.env.STATUS_IN_PROGRESS_OPTION_ID,
                        DONE: process.env.STATUS_DONE_OPTION_ID,
                      }
                      const PROJECT_AUTOMATION_TOKEN = process.env.PROJECT_AUTOMATION_TOKEN || ''

                      const TRACKING_MARKER = /Tracking-Issue:\s*#(\d+)/i
                      const KEYWORD_LINK = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/ig
                      const TRACKING_PR_LINE = `- Pull request: #${pr.number}`
                      const DEPENDABOT_LOGINS = new Set(['app/dependabot', 'dependabot[bot]'])

                      const isDependabotAuthor = (login = '') => DEPENDABOT_LOGINS.has(login)
                      const isDependabotPR = isDependabotAuthor(pr.user?.login)

                      const isResourceAccessError = (error) => {
                        const message = String(error?.message || '')
                        return message.includes('Resource not accessible by integration')
                      }

                      const extractLinkedIssueNumber = (body = '') => {
                        let markerMatch = body.match(TRACKING_MARKER)
                        if (markerMatch) {
                          return Number(markerMatch[1])
                        }

                        let match
                        while ((match = KEYWORD_LINK.exec(body)) !== null) {
                          if (match[3]) return Number(match[3])
                        }

                        return null
                      }

                      const projectGithub = PROJECT_AUTOMATION_TOKEN
                        ? getOctokit(PROJECT_AUTOMATION_TOKEN)
                        : github

                      const graphql = async (query, variables) => {
                        return github.graphql(query, variables)
                      }

                      const projectGraphql = async (query, variables) => {
                        return projectGithub.graphql(query, variables)
                      }

                      const getLivePullRequest = async () => {
                        const response = await github.rest.pulls.get({
                          owner,
                          repo,
                          pull_number: pr.number,
                        })

                        return response.data
                      }

                      const addProjectItem = async (contentId) => {
                        await projectGraphql(
                          `mutation($projectId: ID!, $contentId: ID!) {
                            addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                              item { id }
                            }
                          }`,
                          {
                            projectId: PROJECT_ID,
                            contentId,
                          },
                        )
                      }

                      const getProjectItemIdByContentId = async (contentId) => {
                        let hasNextPage = true
                        let cursor = null

                        while (hasNextPage) {
                          const data = await projectGraphql(
                            `query($projectId: ID!, $cursor: String) {
                              node(id: $projectId) {
                                ... on ProjectV2 {
                                  items(first: 100, after: $cursor) {
                                    pageInfo {
                                      hasNextPage
                                      endCursor
                                    }
                                    nodes {
                                      id
                                      content {
                                        __typename
                                        ... on Issue { id }
                                        ... on PullRequest { id }
                                      }
                                    }
                                  }
                                }
                              }
                            }`,
                            {
                              projectId: PROJECT_ID,
                              cursor,
                            },
                          )

                          const items = data?.node?.items?.nodes || []
                          const found = items.find((item) => item?.content?.id === contentId)
                          if (found?.id) return found.id

                          hasNextPage = data?.node?.items?.pageInfo?.hasNextPage || false
                          cursor = data?.node?.items?.pageInfo?.endCursor || null
                        }

                        return null
                      }

                      const ensureProjectItem = async (contentId) => {
                        try {
                          let itemId = await getProjectItemIdByContentId(contentId)
                          if (!itemId) {
                            await addProjectItem(contentId)
                            itemId = await getProjectItemIdByContentId(contentId)
                          }
                          return itemId
                        } catch (error) {
                          if (isResourceAccessError(error)) {
                            core.warning('Project write was skipped because the workflow token cannot write to the project. Configure or rotate PROJECT_AUTOMATION_TOKEN (see .github/project-automation-token.md).')
                            return null
                          }

                          throw error
                        }
                      }

                      const setStatus = async (itemId, optionId) => {
                        if (!itemId || !optionId) return

                        await projectGraphql(
                          `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                            updateProjectV2ItemFieldValue(
                              input: {
                                projectId: $projectId
                                itemId: $itemId
                                fieldId: $fieldId
                                value: { singleSelectOptionId: $optionId }
                              }
                            ) {
                              projectV2Item { id }
                            }
                          }`,
                          {
                            projectId: PROJECT_ID,
                            itemId,
                            fieldId: STATUS_FIELD_ID,
                            optionId,
                          },
                        )
                      }

                      const ensureIssueAssignee = async (issueNumber, assignee) => {
                        if (!assignee) return
                        await github.rest.issues.addAssignees({
                          owner,
                          repo,
                          issue_number: issueNumber,
                          assignees: [assignee],
                        })
                      }

                      const ensurePRAssignee = async (prNumber, assignee) => {
                        if (!assignee) return
                        await github.rest.issues.addAssignees({
                          owner,
                          repo,
                          issue_number: prNumber,
                          assignees: [assignee],
                        })
                      }

                      const findTrackingIssueNumber = async () => {
                        const allIssues = await github.paginate(github.rest.issues.listForRepo, {
                          owner,
                          repo,
                          state: 'all',
                          per_page: 100,
                        })

                        const existing = allIssues.find((issue) => {
                          return !issue.pull_request && typeof issue.body === 'string' && issue.body.includes(TRACKING_PR_LINE)
                        })

                        return existing?.number || null
                      }

                      const createTrackingIssue = async (existingBody = '') => {
                        const issueTitle = `Tracking: ${pr.title}`
                        const issueBody = [
                          '## Summary',
                          'Automatically created lifecycle tracking issue for this pull request.',
                          '',
                          TRACKING_PR_LINE,
                          `- Branch: \`${pr.head.ref}\``,
                          '',
                          '## Notes',
                          '- This issue is managed by `.github/workflows/project-item-lifecycle.yml`.',
                        ].join('\n')

                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title: issueTitle,
                          body: issueBody,
                        })

                        const newBody = `${existingBody}\n\nTracking-Issue: #${created.data.number}`.trim()
                        await github.rest.pulls.update({
                          owner,
                          repo,
                          pull_number: pr.number,
                          body: newBody,
                        })

                        return created.data.number
                      }

                      const resolveIssueNumber = async () => {
                        if (isDependabotPR) return null

                        const livePr = await getLivePullRequest()
                        const liveBody = livePr.body || ''

                        const fromBody = extractLinkedIssueNumber(liveBody)
                        if (fromBody) return fromBody

                        const existingIssue = await findTrackingIssueNumber()
                        if (existingIssue) {
                          const newBody = `${liveBody}\n\nTracking-Issue: #${existingIssue}`.trim()
                          await github.rest.pulls.update({
                            owner,
                            repo,
                            pull_number: pr.number,
                            body: newBody,
                          })
                          return existingIssue
                        }

                        return createTrackingIssue(liveBody)
                      }

                      const getIssueNodeId = async (issueNumber) => {
                        const issue = await github.rest.issues.get({
                          owner,
                          repo,
                          issue_number: issueNumber,
                        })
                        return issue.data.node_id
                      }

                      const closeIssueIfOpen = async (issueNumber) => {
                        const issue = await github.rest.issues.get({
                          owner,
                          repo,
                          issue_number: issueNumber,
                        })

                        if (issue.data.state === 'open') {
                          await github.rest.issues.update({
                            owner,
                            repo,
                            issue_number: issueNumber,
                            state: 'closed',
                          })
                        }
                      }

                      const issueNumber = await resolveIssueNumber()
                      const issueNodeId = issueNumber ? await getIssueNodeId(issueNumber) : null
                      const prNodeId = pr.node_id

                      const issueItemId = issueNodeId ? await ensureProjectItem(issueNodeId) : null
                      const prItemId = await ensureProjectItem(prNodeId)

                      const author = pr.user?.login
                      const shouldAssignAuthor = Boolean(author) && !isDependabotAuthor(author)

                      if (context.payload.action === 'opened' || context.payload.action === 'reopened') {
                        if (issueNumber && shouldAssignAuthor) {
                          await ensureIssueAssignee(issueNumber, author)
                        }

                        if (shouldAssignAuthor) {
                          await ensurePRAssignee(pr.number, author)
                        }

                        await setStatus(issueItemId, STATUS.IN_PROGRESS)
                        await setStatus(prItemId, STATUS.IN_PROGRESS)
                      }

                      if (context.payload.action === 'synchronize') {
                        await setStatus(issueItemId, STATUS.IN_PROGRESS)
                        await setStatus(prItemId, STATUS.IN_PROGRESS)
                      }

                      if (context.payload.action === 'closed') {
                        if (pr.merged) {
                          await setStatus(issueItemId, STATUS.DONE)
                          await setStatus(prItemId, STATUS.DONE)
                          if (issueNumber) {
                            await closeIssueIfOpen(issueNumber)
                          }
                        } else {
                          await setStatus(issueItemId, STATUS.TODO)
                        }
                      }
